version: "3.9"

services:
  # ── PostgreSQL (production-like local testing) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bhagyaai
      POSTGRES_USER: bhagya
      POSTGRES_PASSWORD: bhagya123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhagya -d bhagyaai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caching, rate limiting) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BhagyaAI API ──────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bhagya:bhagya123@postgres:5432/bhagyaai
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
