  <text x="164" y="116" font-family="Georgia, serif" font-size="10" fill="#7A5E28" letter-spacing="5">DESTINY · AI · COSMOS</text>
  <line x1="164" y1="126" x2="455" y2="126" stroke="#2A2218" stroke-width="0.8"/>
  <text x="164" y="148" font-family="Georgia, serif" font-size="8.5" fill="#3A2E18" letter-spacing="2.5">ASTROLOGY · LAL KITAB · PALMISTRY · NUMEROLOGY</text>
